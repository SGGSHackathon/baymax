services:
  # ── Python FastAPI backend ─────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── WhatsApp server ────────────────────────────────────────
  whatsapp:
    build:
      context: ./whatsapp-server
    ports:
      - "5001:5001"
    env_file: ./whatsapp-server/.env
    environment:
      - PYTHON_URL=http://backend:8000
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    restart: unless-stopped

volumes:
  whatsapp_session:
